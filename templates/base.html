<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LavaReader{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="logo">
            <span class="robot">🌋</span>
            <span class="nom">LavaReader</span>
        </div>
        <p class="slogan">Lecture en fusion · Explorez vos documents jusqu'au cœur du magma</p>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>[🌋] LavaReader · L'intelligence au service de la lecture · 2026</p>
    </footer>
</body>
</html>
